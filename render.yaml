services:
  - type: web
    name: thingual-backend
    env: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: python start_hypercorn.py
    healthCheckPath: /health
    healthCheckTimeoutSeconds: 30
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WHISPER_MODEL
        value: "tiny"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
